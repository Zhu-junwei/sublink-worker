name: Sync Upstream

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main (temporary URL only)
        run: |
          git fetch --no-tags https://github.com/7Sageer/sublink-worker.git main
          echo "UPSTREAM_SHA=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_ENV"
          echo "LOCAL_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Merge and push when upstream changed
        run: |
          set -euo pipefail

          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "No upstream update."
            exit 0
          fi

          git checkout main

          merge_status=0
          git merge --no-commit --no-ff FETCH_HEAD || merge_status=$?

          if [ "$merge_status" -ne 0 ]; then
            workflow_conflicts="$(git diff --name-only --diff-filter=U -- .github/workflows || true)"
            if [ -n "$workflow_conflicts" ]; then
              echo "Keeping local workflow files:"
              echo "$workflow_conflicts"
              git checkout --ours -- .github/workflows
              git add .github/workflows
            fi

            remaining_conflicts="$(git diff --name-only --diff-filter=U || true)"
            if [ -n "$remaining_conflicts" ]; then
              echo "Auto-merge failed. Manual conflict resolution is required:"
              echo "$remaining_conflicts"
              git merge --abort || true
              exit 1
            fi
          fi

          if ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            echo "No upstream update."
            exit 0
          fi

          # GitHub's GITHUB_TOKEN cannot reliably push commits that modify workflows.
          git restore --source=HEAD --staged --worktree .github/workflows
          git commit --allow-empty -m "Merge upstream main"
          git push origin main
          echo "Sync completed: $UPSTREAM_SHA"
